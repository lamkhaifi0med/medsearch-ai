name: medsearch

services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333" # exposed for local load scripts / dashboard
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY:-meta/llama-3.3-70b-instruct}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK:-nvidia/llama-3.3-nemotron-super-49b-v1.5}
      CASES_FILE: /data/cases_clean.jsonl
    volumes:
      - ./data/processed/cases_clean.jsonl:/data/cases_clean.jsonl:ro
      # Reuse the host's HuggingFace cache (BGE-M3 already downloaded locally).
      # If running on a machine without the cache, swap back to a named volume:
      #   - hf_cache:/root/.cache/huggingface
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000" # exposed for API docs / dev frontend
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/v1/health'', timeout=5)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s # model load on first boot
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  redis_data:
